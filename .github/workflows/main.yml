name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli İşletim Sistemi Paketlerini Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libjpeg-dev
          pip install "Cython==0.29.33" buildozer virtualenv

      - name: Buildozer Ayarlarını Sıfırdan Yarat
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = Hadis Oyunu
          package.name = hadisoyunu
          package.domain = org.mustafa
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 0.1
          # Sürümleri sildik ki sistem kendi Android uyumlu yamalarını kullansın!
          requirements = python3,kivy,kivymd,pillow
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 1.9.1
          fullscreen = 0
          android.archs = arm64-v8a, armeabi-v7a
          android.allow_backup = True
          android.accept_sdk_license = True
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF

      - name: APK Derleme İşlemini Başlat
        run: |
          # İŞTE ÇÖKÜŞÜ ENGELLEYEN KİLİT: Masaüstü eklentilerini iptal ediyoruz!
          export DISABLE_TKINTER=1
          export DISABLE_BZIP2=1
          yes | buildozer android debug

      - name: Hazır APK'yı İndirmeye Sun
        uses: actions/upload-artifact@v4
        with:
          name: HadisOyunu-APK
          path: bin/*.apk
